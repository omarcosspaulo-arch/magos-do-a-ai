<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magos do Açaí</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #09060f;
      --surface: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.10);
      --purple: #8b2fc9;
      --purple-lt: #b66ef7;
      --berry: #5a1882;
      --gold: #e0b84d;
      --text: #f0e8ff;
      --muted: rgba(240, 232, 255, 0.50);
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 48px 20px 64px;
      overflow-x: hidden;
    }

    /* ── Starfield ─────────────────────────────────── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .stars span {
      position: absolute;
      border-radius: 50%;
      backgrquound: white;
      animation: twinkle var(--d, 4s) var(--delay, 0s) infinite ease-in-out;
      opacity: 0;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0;
        transform: scale(1);
      }

      50% {
        opacity: var(--op, 0.6);
        transform: scale(1.4);
      }
    }

    /* ── Glow orbs ─────────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #6a1aaa55, transparent 70%);
      top: -100px;
      left: -80px;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, #3b0d6655, transparent 70%);
      bottom: -60px;
      right: -80px;
      animation-delay: -9s;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(40px, 30px) scale(1.1);
      }
    }

    /* ── Fade in animations ────────────────────────── */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Page container ────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .logo-wrap {
      animation: fadeInDown 0.7s ease both;
    }

    .brand {
      animation: fadeInDown 0.7s ease 0.15s both;
    }

    .divider {
      animation: fadeIn 0.5s ease 0.3s both;
    }

    .links .link-btn:nth-child(1) { animation: fadeInUp 0.6s ease 0.35s both; }
    .links .link-btn:nth-child(2) { animation: fadeInUp 0.6s ease 0.45s both; }
    .links .link-btn:nth-child(3) { animation: fadeInUp 0.6s ease 0.55s both; }
    .links .link-btn:nth-child(4) { animation: fadeInUp 0.6s ease 0.65s both; }

    .footer {
      animation: fadeIn 0.6s ease 0.8s both;
    }

    /* ── Logo ──────────────────────────────────────── */
    .logo-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    .logo-ring {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: conic-gradient(from 0deg,
          transparent 0%,
          var(--purple-lt) 25%,
          transparent 50%,
          var(--gold) 75%,
          transparent 100%);
      z-index: -1;
      animation: spin 5s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .logo-ring svg {
      width: 74px;
      height: 74px;
      filter: drop-shadow(0 0 12px var(--purple));
    }

    .sparkle {
      position: absolute;
      font-size: 14px;
      animation: sparkle-float 3s ease-in-out infinite;
    }

    .sparkle-1 {
      top: 0;
      right: -4px;
      animation-delay: 0s;
    }

    .sparkle-2 {
      bottom: 4px;
      left: -6px;
      animation-delay: 1s;
    }

    .sparkle-3 {
      top: 10px;
      left: -8px;
      animation-delay: 0.5s;
      font-size: 10px;
    }

    @keyframes sparkle-float {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.7;
      }

      50% {
        transform: translateY(-6px) rotate(20deg);
        opacity: 1;
      }
    }

    /* ── Brand name ────────────────────────────────── */
    .brand {
      text-align: center;
      margin-bottom: 8px;
    }

    .brand-name {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #d9b4ff 0%, #ffffff 40%, #b66ef7 70%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      margin-bottom: 6px;
      text-shadow: none;
    }

    .brand-tagline {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple-lt), transparent);
      margin: 20px auto 32px;
    }

    /* ── Links ─────────────────────────────────────── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--btn-bg, var(--surface));
      z-index: -1;
      transition: opacity 0.2s;
    }

    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--btn-hover, rgba(255, 255, 255, 0.06));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .link-btn:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 12px 40px rgba(139, 47, 201, 0.35);
    }

    .link-btn:hover::after {
      opacity: 1;
    }

    .link-btn:active {
      transform: translateY(0) scale(0.99);
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--icon-bg, rgba(255, 255, 255, 0.08));
      font-size: 20px;
      transition: transform 0.2s;
    }

    .link-btn:hover .btn-icon {
      transform: scale(1.12) rotate(-4deg);
    }

    .btn-text {
      flex: 1;
    }

    .btn-label {
      display: block;
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      letter-spacing: 0.10em;
      font-weight: 400;
      opacity: 0.55;
      margin-bottom: 3px;
    }

    .btn-title {
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .btn-arrow {
      opacity: 0.4;
      font-size: 18px;
      transition: opacity 0.2s, transform 0.2s;
      flex-shrink: 0;
    }

    .link-btn:hover .btn-arrow {
      opacity: 0.8;
      transform: translateX(3px);
    }

    /* Cardápio Cajuru */
    .btn-cajuru {
      --btn-bg: linear-gradient(135deg, rgba(120, 40, 180, 0.75) 0%, rgba(60, 15, 100, 0.85) 100%);
      --btn-hover: rgba(160, 80, 220, 0.20);
      border-color: rgba(182, 110, 247, 0.55);
      --icon-bg: rgba(160, 80, 230, 0.40);
      box-shadow: 0 4px 24px rgba(139, 47, 201, 0.35), inset 0 1px 0 rgba(200, 150, 255, 0.15);
    }

    .btn-cajuru .btn-icon {
      color: #d8a8ff;
    }

    /* Cardápio Batel */
    .btn-batel {
      --btn-bg: linear-gradient(135deg, rgba(100, 35, 160, 0.75) 0%, rgba(50, 12, 85, 0.85) 100%);
      --btn-hover: rgba(160, 80, 220, 0.20);
      border-color: rgba(224, 184, 77, 0.55);
      --icon-bg: rgba(200, 155, 30, 0.30);
      box-shadow: 0 4px 24px rgba(180, 130, 20, 0.25), inset 0 1px 0 rgba(255, 220, 100, 0.10);
    }

    .btn-batel .btn-icon {
      color: #f0cc60;
    }

    /* WhatsApp */
    .btn-whatsapp {
      --btn-bg: linear-gradient(135deg, rgba(15, 80, 45, 0.80) 0%, rgba(5, 35, 18, 0.90) 100%);
      --btn-hover: rgba(37, 211, 102, 0.15);
      border-color: rgba(37, 211, 102, 0.55);
      --icon-bg: rgba(37, 180, 90, 0.30);
      box-shadow: 0 4px 24px rgba(37, 211, 102, 0.25), inset 0 1px 0 rgba(100, 255, 150, 0.08);
    }

    .btn-whatsapp .btn-icon {
      color: #4ade80;
    }

    /* iFood */
    .btn-ifood {
      --btn-bg: linear-gradient(135deg, rgba(180, 20, 30, 0.75) 0%, rgba(90, 5, 10, 0.90) 100%);
      --btn-hover: rgba(234, 67, 53, 0.15);
      border-color: rgba(234, 67, 53, 0.55);
      --icon-bg: rgba(200, 30, 40, 0.30);
      box-shadow: 0 4px 24px rgba(234, 29, 44, 0.30), inset 0 1px 0 rgba(255, 120, 110, 0.10);
    }

    .btn-ifood .btn-icon {
      color: #f87171;
    }

    /* ── Footer ────────────────────────────────────── */
    .footer {
      margin-top: 40px;
      text-align: center;
    }

    .insta-handle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }

    .insta-handle:hover {
      color: var(--purple-lt);
    }

    .insta-handle svg {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }

    .hours {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.6;
    }
  </style>
</head>

  <script>
    // Generate starfield
    const container = document.getElementById('stars');
    const count = 80;
    for (let i = 0; i < count; i++) {
      const star = document.createElement('span');
      const size = Math.random() * 2.5 + 0.5;
      star.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        top: ${Math.random() * 100}%;
        left: ${Math.random() * 100}%;
        --d: ${Math.random() * 4 + 2}s;
        --delay: ${Math.random() * 6}s;
        --op: ${Math.random() * 0.5 + 0.2};
      `;
      container.appendChild(star);
    }
  </script>
